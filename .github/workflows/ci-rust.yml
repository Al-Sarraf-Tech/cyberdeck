# Generated by haskell-ci-orchestrator — DO NOT EDIT MANUALLY
name: cyberdeck CI
on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
      - v*
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'
permissions:
  contents: write
  security-events: write
concurrency:
  group: cyberdeck-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_HOME: /home/runner/.cargo
  RUSTUP_TMPDIR: /tmp/rustup

jobs:
  repo-guard:
    name: Repository Context Guard
    runs-on: [self-hosted, rust-slim]
    timeout-minutes: 2
    steps:
      - name: Verify repository ownership
        run: |
          echo "Repository: ${{ github.repository }}"
          if [ "${{ github.repository }}" != "Al-Sarraf-Tech/cyberdeck" ]; then
            echo "::error::SECURITY VIOLATION: Unauthorised repository."
            exit 1
          fi
          echo "Repository context verified."
  lint:
    name: Lint
    runs-on: [self-hosted, rust-slim]
    needs: repo-guard
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check formatting
        shell: bash
        timeout-minutes: 5
        run: cargo fmt --all --check
      - name: Clippy lints
        shell: bash
        timeout-minutes: 10
        run: cargo clippy --workspace --all-targets -- -D warnings
  test:
    name: Test
    runs-on: [self-hosted, rust-slim]
    needs: lint
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache ~/.cargo/registry
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ~/.cargo/registry
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache ~/.cargo/git
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          path: ~/.cargo/git
          restore-keys: ${{ runner.os }}-cargo-git-

      - name: Cache target
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          path: target
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Cargo test
        shell: bash
        timeout-minutes: 15
        run: cargo test --all-targets
  coverage:
    name: Coverage
    runs-on: [self-hosted, rust-slim]
    needs: test
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache ~/.cargo/registry
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ~/.cargo/registry
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: Install tarpaulin
        shell: bash
        timeout-minutes: 10
        run: cargo install cargo-tarpaulin --locked --version 0.35.4
      - name: Coverage gate (library only — see tarpaulin.toml)
        shell: bash
        timeout-minutes: 20
        run: cargo tarpaulin
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/tarpaulin/
          retention-days: 14
  security:
    name: Security
    runs-on: [self-hosted, rust-slim]
    needs: lint
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Secrets scan (gitleaks)
        shell: bash
        timeout-minutes: 10
        run: gitleaks detect --source=. --no-banner --exit-code=1
      - name: Cargo audit
        shell: bash
        timeout-minutes: 10
        run: cargo audit
      - name: Cargo deny
        shell: bash
        timeout-minutes: 10
        run: cargo deny check bans licenses sources
  release:
    name: Release
    runs-on: [self-hosted, rust-slim]
    needs:
      - test
      - security
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate checksums
        shell: bash
        timeout-minutes: 5
        run: cd release-assets && sha256sum * > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
